<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Рацион — меню, которое думает за тебя</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FAF6EC;
    --ivory-2:#F2ECDD;
    --sage:#8CA274;
    --sage-dark:#6C8459;
    --sage-light:#DCE5D0;
    --gold:#C9A44C;
    --ink:#2B2A25;
    --ink-soft:#6B675C;
    --line:#E7E0CE;
    --card:#FFFFFF;
    --danger:#C1614A;
    --radius:18px;
    --shadow:0 10px 30px rgba(43,42,37,.08);
    color-scheme: light;
  }
  [data-theme="dark"]{
    --ivory:#191A16;
    --ivory-2:#212319;
    --sage:#9AB57F;
    --sage-dark:#7C9A66;
    --sage-light:#2A3222;
    --gold:#D8B667;
    --ink:#F1EEE3;
    --ink-soft:#A7A392;
    --line:#33342A;
    --card:#212319;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    color-scheme: dark;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Manrope',sans-serif;
    background:var(--ivory);
    color:var(--ink);
    min-height:100vh;
    transition:background .3s,color .3s;
  }
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;}
  .hidden{display:none !important;}

  .screen{min-height:100vh; width:100%;}
  .container{max-width:480px;margin:0 auto;padding:24px 20px 100px;}

  /* ---------- AUTH ---------- */
  #screen-auth{
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--sage-light),var(--ivory) 60%);
    padding:20px;
  }
  .auth-card{
    width:100%;max-width:400px;background:var(--card);border-radius:24px;
    padding:36px 28px;box-shadow:var(--shadow);
  }
  .auth-logo{font-size:38px;text-align:center;margin-bottom:4px;}
  .auth-title{text-align:center;font-size:26px;font-weight:600;margin:0 0 6px;}
  .auth-sub{text-align:center;color:var(--ink-soft);font-size:14px;margin:0 0 28px;}
  .auth-tabs{display:flex;background:var(--ivory-2);border-radius:14px;padding:4px;margin-bottom:24px;}
  .auth-tab{flex:1;text-align:center;padding:10px 0;border-radius:10px;font-weight:600;font-size:14px;color:var(--ink-soft);transition:.2s;}
  .auth-tab.active{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input{
    width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);
    background:var(--ivory);color:var(--ink);font-size:15px;outline:none;transition:.2s;
  }
  .field input:focus{border-color:var(--sage);}
  .btn-primary{
    width:100%;padding:15px;background:var(--sage-dark);color:#fff;border-radius:14px;
    font-weight:700;font-size:15px;margin-top:6px;transition:.2s;
  }
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.6;}
  .auth-error{
    background:#FBEAE5;color:var(--danger);border-radius:10px;padding:10px 12px;
    font-size:13px;margin-bottom:14px;display:none;
  }
  [data-theme="dark"] .auth-error{background:#3A2320;}
  .auth-error.show{display:block;}

  /* ---------- TOPBAR ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 8px;max-width:480px;margin:0 auto;
  }
  .topbar h1{font-size:20px;margin:0;font-weight:600;}
  .icon-btn{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:var(--ivory-2);font-size:18px;}

  /* ---------- ONBOARDING ---------- */
  #screen-onboarding{background:var(--ivory);}
  .ob-progress{display:flex;gap:6px;padding:20px 20px 0;max-width:480px;margin:0 auto;}
  .ob-progress-seg{flex:1;height:5px;border-radius:4px;background:var(--line);}
  .ob-progress-seg.filled{background:var(--sage);}
  .ob-step-title{font-size:24px;font-weight:600;margin:24px 0 6px;}
  .ob-step-sub{color:var(--ink-soft);font-size:14px;margin:0 0 24px;}
  .chip-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .chip{
    padding:10px 16px;border-radius:100px;border:1.5px solid var(--line);
    font-size:14px;font-weight:600;color:var(--ink-soft);background:var(--card);transition:.15s;
  }
  .chip.selected{background:var(--sage);border-color:var(--sage);color:#fff;}
  .option-card{
    display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;
    border:1.5px solid var(--line);background:var(--card);margin-bottom:10px;transition:.15s;
  }
  .option-card.selected{border-color:var(--sage);background:var(--sage-light);}
  .option-card .emoji{font-size:24px;}
  .option-card .label{font-weight:700;font-size:15px;}
  .option-card .desc{font-size:12.5px;color:var(--ink-soft);}
  .ob-nav{display:flex;gap:10px;max-width:480px;margin:24px auto 0;padding:0 20px;}
  .btn-ghost{
    flex:1;padding:15px;border-radius:14px;background:var(--ivory-2);color:var(--ink);font-weight:700;
  }
  .btn-next{flex:2;padding:15px;border-radius:14px;background:var(--sage-dark);color:#fff;font-weight:700;}
  .slider-row{margin-bottom:20px;}
  .slider-row .val{font-size:22px;font-weight:700;color:var(--sage-dark);}
  input[type=range]{width:100%;accent-color:var(--sage-dark);margin-top:8px;}

  /* ---------- LOADING ---------- */
  #screen-loading{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;background:linear-gradient(160deg,var(--sage-light),var(--ivory) 70%);
    padding:20px;text-align:center;
  }
  .loader-spin{
    width:64px;height:64px;border-radius:50%;border:4px solid var(--sage-light);
    border-top-color:var(--sage-dark);animation:spin 1s linear infinite;margin-bottom:28px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader-text{font-size:18px;font-weight:700;margin:0 0 6px;min-height:26px;}
  #loader-sub{color:var(--ink-soft);font-size:14px;margin:0;}

  /* ---------- APP SHELL ---------- */
  #app{padding-bottom:90px;}
  .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}
  .macro-row{display:flex;justify-content:space-between;gap:10px;margin-top:14px;}
  .macro-pill{flex:1;text-align:center;background:var(--ivory-2);border-radius:12px;padding:10px 4px;}
  .macro-pill .num{font-weight:800;font-size:16px;}
  .macro-pill .lab{font-size:11px;color:var(--ink-soft);}
  .meal-card{
    display:flex;gap:14px;padding:14px;border-radius:16px;background:var(--card);
    box-shadow:var(--shadow);margin-bottom:12px;align-items:center;
  }
  .meal-emoji{font-size:30px;width:48px;text-align:center;}
  .meal-name{font-weight:700;font-size:15px;margin:0 0 4px;}
  .meal-meta{font-size:12.5px;color:var(--ink-soft);}
  .section-title{font-size:13px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 10px;}

  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px;}
  .day-pill{
    aspect-ratio:1;border-radius:12px;background:var(--card);display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:var(--shadow);
  }
  .day-pill.active{background:var(--sage-dark);color:#fff;}
  .day-pill .dnum{font-size:15px;}

  .shop-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .shop-check{
    width:24px;height:24px;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;
  }
  .shop-check.checked{background:var(--sage-dark);border-color:var(--sage-dark);color:#fff;}
  .shop-name{flex:1;font-weight:600;font-size:14.5px;}
  .shop-name.checked-text{text-decoration:line-through;color:var(--ink-soft);}
  .shop-amount{font-size:13px;color:var(--ink-soft);}

  .pantry-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .add-form{display:flex;gap:8px;margin-bottom:16px;}
  .add-form input{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:var(--ivory);color:var(--ink);}
  .add-form button{padding:0 18px;border-radius:12px;background:var(--sage-dark);color:#fff;font-weight:700;}

  .navbar{
    position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    display:flex;max-width:480px;margin:0 auto;box-shadow:0 -6px 20px rgba(0,0,0,.06);
  }
  .nav-btn{flex:1;display:grid;place-items:center;gap:2px;padding:10px 0 12px;font-size:10.5px;font-weight:700;color:var(--ink-soft);}
  .nav-btn .ic{font-size:20px;}
  .nav-btn.active{color:var(--sage-dark);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,20,15,.5);display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .modal-overlay.show{display:flex;}
  .modal-sheet{
    background:var(--card);width:100%;max-width:480px;border-radius:24px 24px 0 0;
    max-height:85vh;overflow-y:auto;padding:24px 20px 36px;
  }
  .modal-close{width:34px;height:34px;border-radius:10px;background:var(--ivory-2);display:grid;place-items:center;margin-left:auto;}
  .ing-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .step-row{display:flex;gap:10px;margin-bottom:14px;font-size:14px;line-height:1.5;}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--sage-light);color:var(--sage-dark);
    display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--ivory);
    padding:12px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none;
  }
  [data-theme="dark"] .toast{background:var(--sage-dark);color:#fff;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="screen-auth" class="screen">
  <div class="auth-card">
    <div class="auth-logo">🥗</div>
    <h1 class="auth-title">Рацион</h1>
    <p class="auth-sub">Меню, которое думает за тебя</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Вход</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Регистрация</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="field">
        <label>Почта</label>
        <input type="email" id="login-email" placeholder="you@mail.ru" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Войти</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" class="hidden">
      <div class="field">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Как тебя зовут?" autocomplete="name">
      </div>
      <div class="field">
        <label>Почта</label>
        <input type="email" id="reg-email" placeholder="you@mail.ru" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="reg-btn" onclick="handleRegister()">Создать аккаунт</button>
    </div>
  </div>
</div>

<!-- ==================== ONBOARDING ==================== -->
<div id="screen-onboarding" class="screen hidden">
  <div class="ob-progress" id="ob-progress"></div>
  <div class="container" id="ob-content"></div>
  <div class="ob-nav">
    <button class="btn-ghost" id="ob-back" onclick="obBack()">Назад</button>
    <button class="btn-next" id="ob-next" onclick="obNext()">Далее</button>
  </div>
</div>

<!-- ==================== LOADING ==================== -->
<div id="screen-loading" class="screen hidden">
  <div class="loader-spin"></div>
  <p id="loader-text">🧠 Нейросеть изучает твой профиль…</p>
  <p id="loader-sub">Пожалуйста, подожди</p>
</div>

<!-- ==================== APP ==================== -->
<div id="app" class="screen hidden">
  <div class="topbar">
    <h1 id="app-greeting">Привет!</h1>
    <button class="icon-btn" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="container">
    <div id="tab-today"></div>
    <div id="tab-plan" class="hidden"></div>
    <div id="tab-shopping" class="hidden"></div>
    <div id="tab-pantry" class="hidden"></div>
    <div id="tab-profile" class="hidden"></div>
  </div>

  <div class="navbar">
    <button class="nav-btn active" data-tab="today" onclick="switchTab('today')"><span class="ic">🏠</span>Сегодня</button>
    <button class="nav-btn" data-tab="plan" onclick="switchTab('plan')"><span class="ic">📅</span>План</button>
    <button class="nav-btn" data-tab="shopping" onclick="switchTab('shopping')"><span class="ic">🛒</span>Покупки</button>
    <button class="nav-btn" data-tab="pantry" onclick="switchTab('pantry')"><span class="ic">🥫</span>Кладовка</button>
    <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')"><span class="ic">👤</span>Профиль</button>
  </div>
</div>

<!-- MEAL MODAL -->
<div class="modal-overlay" id="meal-modal" onclick="closeMealModalBg(event)">
  <div class="modal-sheet" id="meal-modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
/* ==================== CONFIG ==================== */
const YANDEX_GPT_CONFIG = {
  proxyUrl: 'https://functions.yandexcloud.net/d4eh0s3c5h9r1a0ikfnk'
};

const MEAL_LABELS = { breakfast:'Завтрак', lunch:'Обед', dinner:'Ужин', snack:'Перекус' };

  { id:'vegan', label:'Веганство' },
  { id:'lactose', label:'Без лактозы' },
  { id:'gluten', label:'Без глютена' },
  { id:'diabetic', label:'Диабет' },
  { id:'nuts', label:'Аллергия на орехи' },

const EQUIP_OPTIONS = ['Духовка','Микроволновка','Мультиварка','Пароварка','Аэрогриль','Блендер'];

/* Fallback local recipes if AI unavailable */
const LOCAL_RECIPES = {
  breakfast: [

      ingredients:[{name:'Овсяные хлопья',amount:60,unit:'г'},{name:'Молоко',amount:200,unit:'мл'},{name:'Ягоды замороженные',amount:80,unit:'г'},{name:'Мёд',amount:15,unit:'г'}],
      steps:['Довести молоко до кипения','Всыпать овсяные хлопья, варить 5 минут','Добавить ягоды и мёд перед подачей'] },
    { name:'Творог с бананом и орехами', emoji:'🍌', kcal:290, protein:22, fat:10, carbs:30, time:5,
      ingredients:[{name:'Творог 5%',amount:150,unit:'г'},{name:'Банан',amount:1,unit:'шт'},{name:'Грецкий орех',amount:20,unit:'г'}],
      steps:['Нарезать банан','Смешать творог с бананом','Посыпать измельчёнными орехами'] },
  ],
  lunch: [
    { name:'Гречка с курицей и овощами', emoji:'🍗', kcal:480, protein:38, fat:14, carbs:52, time:35,
      ingredients:[{name:'Гречка',amount:80,unit:'г'},{name:'Куриное филе',amount:150,unit:'г'},{name:'Морковь',amount:1,unit:'шт'},{name:'Лук',amount:1,unit:'шт'}],
      steps:['Отварить гречку','Обжарить лук и морковь','Добавить нарезанное филе, тушить 15 минут','Смешать с гречкой'] },
  ],
  dinner: [
    { name:'Запечённая рыба с овощами', emoji:'🐟', kcal:390, protein:34, fat:16, carbs:22, time:30,
      ingredients:[{name:'Филе трески',amount:200,unit:'г'},{name:'Брокколи',amount:150,unit:'г'},{name:'Оливковое масло',amount:10,unit:'мл'}],
      steps:['Разогреть духовку до 200°C','Выложить рыбу и брокколи на противень, сбрызнуть маслом','Запекать 20-25 минут'] },
  ],
  snack: [
    { name:'Яблоко и горсть миндаля', emoji:'🍎', kcal:180, protein:5, fat:11, carbs:18, time:1,
      ingredients:[{name:'Яблоко',amount:1,unit:'шт'},{name:'Миндаль',amount:20,unit:'г'}],
      steps:['Готово к употреблению'] },
  ]
};

/* ==================== HELPERS ==================== */
function $(id){ return document.getElementById(id); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); $(id).classList.remove('hidden'); }
function todayStr(d=new Date()){ return d.toISOString().slice(0,10); }
function addDays(dateStr, n){ const d = new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return todayStr(d); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function hash(str){ return CryptoJS.SHA256(str).toString(); }
function uid(){ return Math.random().toString(36).slice(2,10); }

/* ==================== USERS / AUTH STORAGE ==================== */
function getUsers(){ return JSON.parse(localStorage.getItem('ration_users')||'{}'); }
function saveUsers(u){ localStorage.setItem('ration_users', JSON.stringify(u)); }
function stateKey(email){ return 'ration_state_' + email; }

let state = null;
let currentUserEmail = null;

const DEFAULT_STATE = () => ({
  profile:null, plan:{}, favorites:[], shoppingChecked:{}, theme:'light',
  planStart:null, planDays:7, pantry:{}
});

function loadState(email){
  const raw = localStorage.getItem(stateKey(email));
  state = raw ? JSON.parse(raw) : DEFAULT_STATE();
}
function saveState(){
  if(!currentUserEmail) return;
  localStorage.setItem(stateKey(currentUserEmail), JSON.stringify(state));
}

/* ==================== AUTH ==================== */
let authMode = 'login';
function switchAuthTab(tab){
  authMode = tab;
  $('tab-login').classList.toggle('active', tab==='login');
  $('tab-register').classList.toggle('active', tab==='register');
  $('form-login').classList.toggle('hidden', tab!=='login');
  $('form-register').classList.toggle('hidden', tab!=='register');
  hideAuthError();
}
function showAuthError(msg){ const e=$('auth-error'); e.textContent=msg; e.classList.add('show'); }
function hideAuthError(){ $('auth-error').classList.remove('show'); }

function handleLogin(){
  hideAuthError();
  const email = $('login-email').value.trim().toLowerCase();
  const pass = $('login-password').value;
  if(!email || !pass){ showAuthError('Заполни почту и пароль'); return; }
  const users = getUsers();
  const u = users[email];
  if(!u || u.passHash !== hash(pass)){ showAuthError('Неверная почта или пароль'); return; }
  currentUserEmail = email;
  loadState(email);
  applyTheme();
  routeAfterAuth();
}

function handleRegister(){
  hideAuthError();
  const name = $('reg-name').value.trim();
  const email = $('reg-email').value.trim().toLowerCase();
  const pass = $('reg-password').value;
  if(!name || !email || !pass){ showAuthError('Заполни все поля'); return; }
  if(pass.length < 6){ showAuthError('Пароль минимум 6 символов'); return; }
  const users = getUsers();
  if(users[email]){ showAuthError('Такая почта уже зарегистрирована'); return; }
  users[email] = { name, passHash: hash(pass) };
  saveUsers(users);
  currentUserEmail = email;
  state = DEFAULT_STATE();
  saveState();
  routeAfterAuth();
}

function logout(){
  currentUserEmail = null;
  state = null;
  show('screen-auth');
}

function routeAfterAuth(){
  if(!state.profile){
    startOnboarding();
  } else {
    enterApp();
  }
}

/* ==================== ONBOARDING ==================== */
let ob = {
  step:0,
  data:{
    name:'', gender:'female', age:28, height:165, weight:65, activity:1.375,
    goal:'maintain', restrictions:[], equip:[], level:'medium',
    budget:6000, period:7,
    meals:{ breakfast:true, lunch:true, dinner:true, snack:true }

/* Mifflin-St Jeor */
function calcTargets(d){
  let bmr;
  if(d.gender==='male'){
    bmr = 10*d.weight + 6.25*d.height - 5*d.age + 5;
  } else {
    bmr = 10*d.weight + 6.25*d.height - 5*d.age - 161;
  }
  let tdee = bmr * d.activity;
  if(d.goal==='lose') tdee *= 0.82;
  if(d.goal==='gain') tdee *= 1.15;
  const kcal = Math.round(tdee/10)*10;
  const protein = Math.round(d.weight * (d.goal==='gain' ? 2.0 : 1.8));
  const fat = Math.round(d.weight * 1.0);
  const carbsKcal = kcal - (protein*4 + fat*9);
  const carbs = Math.max(50, Math.round(carbsKcal/4));
  return { kcal, protein, fat, carbs };
}

/* ==================== AI PLAN GENERATION ==================== */
async function callYandexGPTPlan(profile, days){
  const cfg = YANDEX_GPT_CONFIG;
  const mealsOn = Object.keys(profile.meals).filter(k=>profile.meals[k]);
  const dailyBudget = Math.round(profile.budget/days);
  const restrictionsText = profile.restrictions.length
    ? profile.restrictions.map(r=>(RESTRICTION_OPTIONS.find(o=>o.id===r)||{}).label||r).join(', ')
    : 'нет особых ограничений';
  const equipText = profile.equip.length ? profile.equip.join(', ') : 'только плита и духовка';
  const diabeticNote = profile.restrictions.includes('diabetic')
    ? ' У пользователя диабет — исключи простые сахара, используй продукты с низким гликемическим индексом.' : '';

  const systemPrompt = 'Ты — нейродиетолог сервиса "Рацион". Отвечай ТОЛЬКО валидным JSON, без markdown-разметки, без пояснений, без ```.';
  const userPrompt = `Составь персональное меню на ${days} дн. Бюджет: ${profile.budget} ₽ (~${dailyBudget} ₽/день). Цель: ${profile.goal}. Норма: ${profile.kcal} ккал, Б:${profile.protein} Ж:${profile.fat} У:${profile.carbs} г. Уровень готовки: ${DIFF_LABELS[profile.level]}. Техника: ${equipText}. Ограничения: ${restrictionsText}.${diabeticNote} Приёмы пищи: ${mealsOn.map(m=>MEAL_LABELS[m]).join(', ')}.
Меню должно быть разнообразным, блюда не повторяются между днями.
Ответь СТРОГО валидным JSON: массив из ${days} объектов. У каждого объекта — ключи ровно такие: ${mealsOn.join(', ')}.
У каждого блюда поля: name (строка), emoji (один эмодзи), kcal (число), protein (число), fat (число), carbs (число), time (минуты, число), ingredients (массив объектов {name, amount (число), unit: "г" или "мл" или "шт"}), steps (массив строк с шагами приготовления).
Ингредиенты — реальные продукты, доступные в российских магазинах. Никакого текста до или после JSON.`;

  const requestBody = { system: systemPrompt, messages:[{ role:'user', content:userPrompt }] };

  const res = await fetch(cfg.proxyUrl, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify(requestBody)
  });

  if(!res.ok){
    const errText = await res.text().catch(()=> '');
    throw new Error(`Ошибка HTTP ${res.status}: ${errText}`);
  }

  const data = await res.json();

  // Пытаемся вытащить текст из разных возможных форматов ответа прокси
  let text = '';
  if(data?.content?.[0]?.text) text = data.content[0].text;
  else if(typeof data?.content === 'string') text = data.content;
  else if(data?.result?.alternatives?.[0]?.message?.text) text = data.result.alternatives[0].message.text;
  else if(data?.text) text = data.text;
  else if(typeof data === 'string') text = data;

  if(!text) throw new Error('Пустой ответ нейросети (неизвестный формат ответа прокси)');

  // Убираем возможные markdown-обёртки ```json ... ```
  let clean = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();

  // На случай если модель добавила текст до/после JSON — вытаскиваем сам массив
  const firstBracket = clean.indexOf('[');
  const lastBracket = clean.lastIndexOf(']');
  if(firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket){
    clean = clean.slice(firstBracket, lastBracket+1);
  }

  let parsed;
  try{
    parsed = JSON.parse(clean);
  } catch(e){
    console.error('Не удалось распарсить JSON от нейросети:', clean);
    throw new Error('Нейросеть вернула некорректный JSON');
  }
  if(!Array.isArray(parsed) || !parsed.length){
    throw new Error('Нейросеть вернула пустой план');
  }
  return parsed;
}

function generateLocalDayPlan(mealsOn){
  const day = {};
  mealsOn.forEach(m=>{
    const pool = LOCAL_RECIPES[m] || LOCAL_RECIPES.lunch;
    const r = pool[Math.floor(Math.random()*pool.length)];
    day[m] = JSON.parse(JSON.stringify(r));
  });
  return day;
}

function generateLocalPlan(profile, days){
  const mealsOn = Object.keys(profile.meals).filter(k=>profile.meals[k]);
  const plan = {};
  for(let i=0;i<days;i++){
    const dateStr = addDays(state.planStart, i);
    plan[dateStr] = generateLocalDayPlan(mealsOn);
  }
  return plan;
}

function applyAiDays(daysArray, days){
  const plan = {};
  for(let i=0;i<days;i++){
    const dateStr = addDays(state.planStart, i);
    plan[dateStr] = daysArray[i] || null;
  }
  // если модель вернула меньше дней чем нужно — докидываем локальными для недостающих
  for(const dateStr in plan){
    if(!plan[dateStr]){
      const mealsOn = Object.keys(state.profile.meals).filter(k=>state.profile.meals[k]);
      plan[dateStr] = generateLocalDayPlan(mealsOn);
    }
  }
  return plan;
}

/**
 * Главная функция генерации.
 * Возвращает { ok:true, source:'ai'|'local' } ТОЛЬКО когда state.plan уже полностью записан.
 * Это ключевое исправление — раньше экран мог переключиться до того как план реально сохранился.
 */
async function generatePlan(){
  const profile = state.profile;
  const days = state.planDays;
  try{
    const daysArray = await Promise.race([
      callYandexGPTPlan(profile, days),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('Таймаут ответа нейросети (45с)')), 45000))
    ]);
    state.plan = applyAiDays(daysArray, days);
    saveState();
    return { ok:true, source:'ai' };
  } catch(e){
    console.error('AI-генерация не удалась, использую локальный план:', e);
    state.plan = generateLocalPlan(profile, days);
    saveState();
    return { ok:true, source:'local', error: e.message };
  }
}

/* ==================== LOADING SCREEN / FINISH ONBOARDING ==================== */
async function finishOnboarding(){
  const targets = calcTargets(ob.data);
  const profile = Object.assign({}, ob.data, targets);

  state = DEFAULT_STATE();
  state.profile = profile;
  state.planStart = todayStr();
  state.planDays = ob.data.period;
  saveState();

  show('screen-loading');
  const loaderText = $('loader-text');
  const loaderSub = $('loader-sub');

  const steps = [
    '🧠 Нейросеть изучает твой профиль…',
    '🍽️ Подбираем оптимальное меню…',
    '🥕 Выбираем свежие ингредиенты…',
    '📊 Формируем персональную диету…'
  ];
  let stepIndex = 0;
  loaderText.textContent = steps[0];
  loaderSub.textContent = 'Пожалуйста, подожди';
  const stepInterval = setInterval(()=>{
    stepIndex = (stepIndex+1) % steps.length;
    loaderText.textContent = steps[stepIndex];
  }, 3500);

  // Ждём РЕАЛЬНОГО завершения генерации плана — никакого фиксированного таймера гонки.
  const result = await generatePlan();

  clearInterval(stepInterval);

  if(result.source === 'ai'){
    loaderText.textContent = '✅ Меню готово!';
    loaderSub.textContent = 'Нейросеть подобрала рацион специально для тебя';
  } else {
    loaderText.textContent = '✅ Меню готово!';
    loaderSub.textContent = 'Нейросеть была недоступна — подобрали локально';
  }

  await new Promise(r=>setTimeout(r, 900));
  enterApp();
}

  const dayPlan = state.plan[dateStr];
  const el = $('day-detail');
  if(!dayPlan){ el.innerHTML = '<div class="empty-state">Нет данных на этот день</div>'; return; }
  el.innerHTML = Object.keys(dayPlan).map(mealKey=>{
    const meal = dayPlan[mealKey];
    if(!meal) return '';
    return `
      <div class="meal-card" onclick='openMealModal(${JSON.stringify(meal).replace(/'/g,"&#39;")}, "${MEAL_LABELS[mealKey]||mealKey}")'>
        <div class="meal-emoji">${meal.emoji||'🍽️'}</div>
        <div style="flex:1">
          <div class="meal-name">${meal.name}</div>
          <div class="meal-meta">${MEAL_LABELS[mealKey]||mealKey} · ${meal.kcal||0} ккал</div>
        </div>
      </div>`;
  }).join('');
}

/* ---------- SHOPPING LIST ---------- */
function buildShoppingList(){
  const agg = {};
  Object.values(state.plan).forEach(dayPlan=>{
    if(!dayPlan) return;
    Object.values(dayPlan).forEach(meal=>{
      if(!meal || !meal.ingredients) return;
      meal.ingredients.forEach(ing=>{
        const key = ing.name.toLowerCase()+'|'+(ing.unit||'');
        if(!agg[key]) agg[key] = { name:ing.name, unit:ing.unit||'', amount:0 };
        agg[key].amount += Number(ing.amount)||0;
      });
    });
  });
  return Object.values(agg).sort((a,b)=>a.name.localeCompare(b.name,'ru'));
}
function renderShopping(){
  const list = buildShoppingList();
  const el = $('tab-shopping');
  if(!list.length){
    el.innerHTML = '<div class="empty-state">Список покупок появится после генерации плана</div>';
    return;
  }
  el.innerHTML = `
    <div class="section-title" style="margin-top:0">Список покупок</div>
    <div class="card">
      ${list.map((item,idx)=>{
        const checked = !!state.shoppingChecked[item.name];
        return `
        <div class="shop-item">
          <button class="shop-check ${checked?'checked':''}" onclick="toggleShopItem('${item.name.replace(/'/g,"\\'")}')">${checked?'✓':''}</button>
          <div class="shop-name ${checked?'checked-text':''}">${item.name}</div>
          <div class="shop-amount">${Math.round(item.amount)} ${item.unit}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}
function toggleShopItem(name){
  state.shoppingChecked[name] = !state.shoppingChecked[name];
  saveState();
  renderShopping();
}

/* ---------- PANTRY ---------- */
function renderPantry(){
  const el = $('tab-pantry');
  const items = Object.entries(state.pantry||{});
  el.innerHTML = `
    <div class="section-title" style="margin-top:0">Кладовка</div>
    <div class="add-form">
      <input id="pantry-name" placeholder="Например: Рис">
      <input id="pantry-amount" placeholder="500г" style="max-width:100px;">
      <button onclick="addPantryItem()">+</button>
    </div>
    <div class="card">
      ${items.length ? items.map(([name,amount])=>`
        <div class="pantry-item">
          <div style="flex:1;font-weight:600;">${name}</div>
          <div style="color:var(--ink-soft);">${amount}</div>
          <button class="icon-btn" onclick="removePantryItem('${name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      `).join('') : '<div class="empty-state">Кладовка пуста</div>'}
    </div>
  `;
}
function addPantryItem(){
  const name = $('pantry-name').value.trim();
  const amount = $('pantry-amount').value.trim();
  if(!name) return;
  state.pantry[name] = amount || '—';
  saveState();
  renderPantry();
}
function removePantryItem(name){
  delete state.pantry[name];
  saveState();
  renderPantry();
}

/* ---------- PROFILE ---------- */
function renderProfile(){
  const el = $('tab-profile');
  const p = state.profile;
  el.innerHTML = `
    <div class="section-title" style="margin-top:0">Профиль</div>
    <div class="card">
      <div style="font-weight:700;font-size:17px;margin-bottom:4px;">${p.name}</div>
      <div style="color:var(--ink-soft);font-size:13px;margin-bottom:16px;">${currentUserEmail}</div>
      <div class="macro-row">
        <div class="macro-pill"><div class="num">${p.kcal}</div><div class="lab">ккал/день</div></div>
        <div class="macro-pill"><div class="num">${p.protein}г</div><div class="lab">белки</div></div>
        <div class="macro-pill"><div class="num">${p.fat}г</div><div class="lab">жиры</div></div>
        <div class="macro-pill"><div class="num">${p.carbs}г</div><div class="lab">углеводы</div></div>
      </div>
    </div>
    <button class="btn-primary" style="background:var(--gold);margin-bottom:10px;" onclick="regeneratePlanFlow()">🔄 Сгенерировать план заново</button>
    <button class="btn-ghost" style="width:100%;margin-bottom:10px;" onclick="restartOnboardingFlow()">✏️ Пройти анкету заново</button>
    <button class="btn-ghost" style="width:100%;color:var(--danger);" onclick="logout()">Выйти из аккаунта</button>
  `;
}

async function regeneratePlanFlow(){
  toast('Генерируем новый план…');
  state.planStart = todayStr();
  const result = await generatePlan();
  toast(result.source==='ai' ? 'Новый план от нейросети готов!' : 'Нейросеть недоступна — план подобран локально');
  switchTab('today');
}
function restartOnboardingFlow(){
  state.profile = null;
  saveState();
  startOnboarding();
}

/* ==================== INIT ==================== */
window.addEventListener('DOMContentLoaded', ()=>{
  show('screen-auth');
});
</script>
</body>
